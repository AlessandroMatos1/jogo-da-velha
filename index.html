<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo da Velha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Jogo da Velha</h1>

  <div id="placar">
    <span>X: <strong id="placar-x">0</strong></span>
    <span>Empates: <strong id="placar-empate">0</strong></span>
    <span>O: <strong id="placar-o">0</strong></span>
  </div>

  <div id="controles">
    <button id="modo-btn">Modo: 2 Jogadores</button>
    <button id="reiniciar">Reiniciar Rodada</button>
    <button id="zerar-placar">Zerar placar</button>
  </div>

  <div id="info">Vez do jogador: <span id="jogador-atual">X</span></div>

  <div id="tabuleiro">
    <div class="celula" data-index="0"></div>
    <div class="celula" data-index="1"></div>
    <div class="celula" data-index="2"></div>
    <div class="celula" data-index="3"></div>
    <div class="celula" data-index="4"></div>
    <div class="celula" data-index="5"></div>
    <div class="celula" data-index="6"></div>
    <div class="celula" data-index="7"></div>
    <div class="celula" data-index="8"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
